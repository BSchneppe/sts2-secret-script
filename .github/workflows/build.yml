name: Build PCK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Note: The DLL build requires game assemblies (sts2.dll, GodotSharp.dll, 0Harmony.dll)
# which cannot be redistributed. Only the PCK (assets + localization) can be built in CI.
# Full mod build (DLL + PCK) must be done locally with the game installed.

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install Pillow

      - name: Pack PCK
        run: python pack_pck.py SecretScript SecretScript.pck SecretScript

      - name: Upload mod files
        uses: actions/upload-artifact@v4
        with:
          name: SecretScript
          path: |
            SecretScript.json
            SecretScript.pck
